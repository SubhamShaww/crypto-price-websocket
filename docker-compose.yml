version: '3.8'

services:
  crypto-price-server:
    build: .
    ports:
      - "3000:3000"  # REST API
      - "8000:8000"  # WebSocket server
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - crypto-network

networks:
  crypto-network:
    driver: bridge